<!DOCTYPE html>
<html>
<head>
  <title>Docker App</title>
</head>
<body>
  <h1>Datos:</h1>
  <ul id="list"></ul>

  <script>
    fetch("http://localhost:5000/list")
      .then(res => res.json())
      .then(data => {
        const ul = document.getElementById("list");
        data.forEach(d => {
          const li = document.createElement("li");
          li.innerText = d;
          ul.appendChild(li);
        });
      });
  </script>
</body>
</html>
